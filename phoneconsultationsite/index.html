<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휴대폰싸게파는사람들 — 셀프 견적 상담</title>
<meta name="description" content="통신사, 기종, 요금제를 직접 선택하고 나에게 맞는 월 납부금을 바로 확인해 보세요.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">

      <span class="site-name" id="site-name">휴대폰싸게파는사람들</span>
      <span class="biz-name" id="biz-name"></span>
    </div>
    <div class="topbar-actions">
      <a class="pill-btn call" id="btn-call" href="#">📞 전화</a>
      <a class="pill-btn kakao" id="btn-kakao" href="#" target="_blank" rel="noopener">💬 카톡</a>
    </div>
  </div>
</header>

<div class="progress-wrap" id="progress-wrap" hidden>
  <div class="progress-track" id="progress-track"></div>
  <div class="progress-label" id="progress-label"></div>
</div>

<main class="wizard-main" id="wizard-main">
  <div class="step-card">
    <div class="loading-box">데이터를 불러오는 중입니다…</div>
  </div>
</main>

<div class="notice-banner" id="prepaid-banner" hidden>
  <a id="prepaid-link" href="#" target="_blank" rel="noopener">📱 매장 방문 없이 선불폰 비대면 개통하기 →</a>
</div>

<script src="js/store-data.js"></script>
<script type="module" src="js/wizard.js"></script>
</body>
</html>
